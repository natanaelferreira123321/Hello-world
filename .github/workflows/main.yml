name: Pipeline de Banco de Dados SQLite

on: [push]

jobs:
  construir_banco:
    runs-on: ubuntu-latest

    steps:
      - name: Copiar arquivos para a máquina
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Executar criacao do banco
        run: python init_db.py

      - name: Entregar o arquivo .db pronto (Artifact)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: meu-banco-de-dados
          path: biblioteca.db
